schema_version: 2
project_name: lunavla-v2-transformer-visual-cpu
engine: lunavla_v2
policy:
  type: transformer_chunk
  state_dim: 3
  instruction_dim: 32
  image_shape: [32, 32, 3]
  action_dim: 2
  chunk_size: 4
  d_model: 64
  nhead: 4
  num_layers: 2
  latent_dim: 16
  dropout: 0.0
  temporal_ensemble_decay: 0.25
  device: cpu
task:
  id: rendered_visual_point_reach
  family: all
  max_steps: 24
  render_size: 32
dataset:
  type: memory
  split: train
  seed: 42
  episode_count: 6
  parameters:
    observation_mode: vision_required
training:
  device: cpu
  seed: 42
  batch_size: 16
  steps: 50
  learning_rate: 0.001
  kl_weight: 0.01
evaluation:
  execution_mode: receding_horizon
  episodes: 20
  seed: 1000
  language_ablation: none
  image_ablation: occlusion
artifacts:
  output_dir: outputs/v2/transformer-visual-cpu
  checkpoint_name: checkpoint.pt
