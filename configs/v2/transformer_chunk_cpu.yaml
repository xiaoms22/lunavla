schema_version: 2
project_name: lunavla-v2-transformer-cpu
engine: lunavla_v2
policy:
  type: transformer_chunk
  state_dim: 2
  instruction_dim: 16
  image_shape: null
  action_dim: 2
  chunk_size: 4
  d_model: 64
  nhead: 4
  num_layers: 2
  latent_dim: 16
  dropout: 0.0
  temporal_ensemble_decay: 0.25
  device: cpu
task:
  id: language_conditioned_point_reach
  family: point_reach
  max_steps: 40
  goal: [0.8, 0.2]
  parameters:
    language_split: heldout
dataset:
  type: memory
  split: train
  seed: 42
  episode_count: 32
training:
  device: cpu
  seed: 42
  batch_size: 16
  steps: 50
  learning_rate: 0.001
  kl_weight: 0.01
evaluation:
  execution_mode: receding_horizon
  episodes: 20
  seed: 1000
  language_ablation: shuffle
  image_ablation: none
artifacts:
  output_dir: outputs/v2/transformer-cpu
  checkpoint_name: checkpoint.pt
