schema_version: 1
project_name: luna_vla_act_pusht_baseline
framework: lunavla
policy:
  type: numpy_linear_chunk
  observation_dim: 4
  instruction_dim: 8
  action_dim: 2
  chunk_size: 8
task: pusht_style_point_reach
dataset:
  source: mock_pusht
  num_episodes: 128
  steps_per_episode: 32
  seed: 42
  split_seed: 42
  train_fraction: 0.8
  validation_fraction: 0.1
  test_fraction: 0.1
  language_instruction: push the T block to the goal
training:
  device: cpu
  batch_size: 64
  num_steps: 2000
  learning_rate: 0.04
  seed: 42
  log_interval: 100
eval:
  episodes: 50
  seed: 1000
  rollout_steps: 40
  success_distance: 0.10
  goal: [0.80, 0.20]
  start_low: 0.05
  start_high: 0.95
  action_clip: 0.12
  execution_mode: open_loop_chunk
artifacts:
  output_dir: outputs/act_pusht_baseline
  checkpoint_name: checkpoint.json
  report_path: outputs/act_pusht_baseline/summary_report.md
