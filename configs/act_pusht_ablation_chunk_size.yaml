model:
  name: mini_vla
  policy_type: act
  observation_dim: 4
  instruction_dim: 8
  action_dim: 2
  chunk_size: 4
project_name: minimind_vla_act_pusht_chunk_ablation
framework: minimind-vla
policy:
  name: act
  chunk_size: 4
task: pusht
dataset:
  source: mock_pusht
  num_episodes: 128
  steps_per_episode: 32
  seed: 42
  language_instruction: push the T block to the goal
training:
  device: cuda
  batch_size: 64
  num_steps: 2000
  learning_rate: 0.04
  seed: 43
  log_interval: 100
eval:
  episodes: 50
  rollout_steps: 40
  success_distance: 0.10
artifacts:
  output_dir: outputs/act_pusht_ablation_chunk_size
  checkpoint_name: checkpoint.pt
  report_path: outputs/act_pusht_ablation_chunk_size/summary_report.md
