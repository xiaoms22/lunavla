schema_version: 1
project_name: luna_vla_act_pusht_jsonl_noisy_smoke
framework: lunavla
policy:
  type: numpy_linear_chunk
  observation_dim: 4
  instruction_dim: 8
  action_dim: 2
  chunk_size: 4
task: pusht_style_point_reach
dataset:
  source: jsonl
  path: data/examples/pusht_jsonl_noisy_smoke.jsonl
  num_episodes: 12
  steps_per_episode: 16
  seed: 321
  split_seed: 321
  train_fraction: 0.8
  validation_fraction: 0.1
  test_fraction: 0.1
  start_low: 0.0
  start_high: 1.0
  goal: [0.80, 0.20]
  action_noise_std: 0.03
  language_instruction: push the T block to the goal
training:
  device: cpu
  batch_size: 32
  num_steps: 300
  learning_rate: 0.04
  seed: 42
  log_interval: 50
eval:
  episodes: 5
  seed: 1000
  rollout_steps: 36
  success_distance: 0.12
  goal: [0.80, 0.20]
  start_low: 0.0
  start_high: 1.0
  action_clip: 0.12
  execution_mode: open_loop_chunk
artifacts:
  output_dir: outputs/act_pusht_jsonl_noisy_smoke
  checkpoint_name: checkpoint.json
  report_path: outputs/act_pusht_jsonl_noisy_smoke/summary_report.md
