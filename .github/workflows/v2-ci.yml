name: V2 CPU

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v2-cpu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: v2-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv and lightweight development profile
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv sync --frozen --extra dev
      - name: Verify versioned dependency locks
        run: |
          uv lock --check
          uv pip check
          uv run --no-sync python scripts/lock_v2_cpu.py --check
      - name: Validate v1.1 and v2 configuration contracts
        run: |
          uv run --no-sync python scripts/validate_configs.py
          uv run --no-sync python scripts/check_repo_quality.py
          uv run --no-sync python scripts/render_readme_results.py --check \
            --v2-snapshot results/v2/language-alpha2
      - name: Run static checks
        run: |
          uv run --no-sync ruff check lunavla tests_v2
          uv run --no-sync ruff check scripts/run_v2_release_profile.py
          uv run --no-sync mypy lunavla scripts/run_v2_release_profile.py
          uv run --no-sync python -m compileall -q lunavla scripts/run_v2_release_profile.py
      - name: Run dependency-light v2 tests
        run: uv run --no-sync pytest tests_v2 -m "not torch and not lerobot"

  torch-cpu:
    name: v2-torch-cpu
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU-only PyTorch test environment
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv venv --python 3.12
          uv pip sync requirements-v2-core-cpu.lock \
            --require-hashes --strict --only-binary :all: --torch-backend cpu
          uv pip install --no-deps --no-build-isolation --editable .
          uv pip check
      - name: Verify pinned runtime versions
        run: |
          uv run --no-sync python - <<'PY'
          import importlib.metadata as metadata

          import numpy
          import torch
          import torchvision

          assert numpy.__version__ == "2.2.6"
          assert torch.__version__ == "2.11.0+cpu"
          assert torch.version.cuda is None
          assert not torch.cuda.is_available()
          assert torchvision.__version__ == "0.26.0+cpu"
          installed = {
              dist.metadata["Name"].lower().replace("_", "-")
              for dist in metadata.distributions()
              if dist.metadata["Name"]
          }
          from scripts.lock_v2_cpu import forbidden_cpu_packages

          forbidden = forbidden_cpu_packages(installed)
          assert not forbidden, f"CUDA-only packages installed in CPU job: {sorted(forbidden)}"
          PY
      - name: Run PyTorch CPU contract tests
        run: uv run --no-sync pytest tests_v2 -m torch

  lerobot-adapter:
    name: v2-lerobot-adapter
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the full CPU v2 dataset profile
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv venv --python 3.12
          uv pip sync requirements-v2-cpu.lock \
            --require-hashes --strict --only-binary :all: --torch-backend cpu
          uv pip install --no-deps --no-build-isolation --editable .
          uv pip check
      - name: Reject CUDA-only packages in the CPU adapter profile
        run: |
          uv run --no-sync python - <<'PY'
          import importlib.metadata as metadata

          import numpy
          import torch
          import torchvision

          assert numpy.__version__ == "2.2.6"
          assert torch.__version__ == "2.11.0+cpu"
          assert torch.version.cuda is None
          assert torchvision.__version__ == "0.26.0+cpu"
          installed = {
              dist.metadata["Name"].lower().replace("_", "-")
              for dist in metadata.distributions()
              if dist.metadata["Name"]
          }
          from scripts.lock_v2_cpu import forbidden_cpu_packages

          forbidden = forbidden_cpu_packages(installed)
          assert not forbidden, f"CUDA-only packages installed in CPU job: {sorted(forbidden)}"
          PY
      - name: Verify the real LeRobot dataset import path
        run: uv run --no-sync pytest tests_v2 -m lerobot
        env:
          LUNAVLA_REQUIRE_LEROBOT: "1"

  v11-compat:
    name: v1.1-compat
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install the frozen v1.1 profile
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run the complete v1.1 suite
        run: python -m pytest tests --cov --cov-report=term-missing
      - name: Keep the v1.1 CPU quickstart operational
        run: timeout 120 python scripts/run_quickstart.py

  secret-scan:
    name: v2-secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan the complete Git history
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
