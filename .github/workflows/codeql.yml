name: CodeQL

on:
  push:
    branches: [main, v1.x, v2, v3, v3-next]
  pull_request:
    branches: [main, v1.x, v2, v3, v3-next]
  schedule:
    - cron: "41 3 * * 4"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
