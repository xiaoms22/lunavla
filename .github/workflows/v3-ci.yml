name: V3 Alpha CPU

on:
  push:
    branches: [v3, v3-next]
  pull_request:
    branches: [v3, v3-next, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v3-alpha-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: v3-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip "uv==0.11.26"
      - run: uv sync --frozen --extra dev
      - name: Static and contract checks
        run: |
          uv run --no-sync ruff check lunavla/v3 tests_v3 scripts/check_v3_alpha.py \
            scripts/run_v3_runner_preflight.py scripts/run_v3_code_release.py \
            scripts/generate_v3_diagnostic_image_fixtures.py
          uv run --no-sync mypy lunavla/v3 scripts/check_v3_alpha.py \
            scripts/run_v3_runner_preflight.py scripts/run_v3_code_release.py \
            scripts/generate_v3_diagnostic_image_fixtures.py
          uv run --no-sync python -m compileall -q lunavla/v3 scripts/check_v3_alpha.py \
            scripts/run_v3_runner_preflight.py scripts/run_v3_code_release.py \
            scripts/generate_v3_diagnostic_image_fixtures.py
          uv run --no-sync python scripts/check_v3_alpha.py
          uv run --no-sync python scripts/generate_v3_diagnostic_image_fixtures.py --check
          uv run --no-sync pytest tests_v3/test_contracts.py tests_v3/test_config_migration.py

  data:
    name: v3-data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip "uv==0.11.26"
      - run: uv sync --frozen --extra dev
      - run: uv run --no-sync pytest tests_v3/test_data_engine_artifacts.py -k "split or data_audit"

  engine-cpu:
    name: v3-engine-cpu
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install hash-locked CPU environment
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv venv --python 3.12
          uv pip sync requirements-v3-core-cpu.lock \
            --require-hashes --strict --only-binary :all: --torch-backend cpu
          uv pip install --no-deps --no-build-isolation --editable .
          uv pip check
      - name: Verify CPU-only runtime
        run: |
          uv run --no-sync python - <<'PY'
          import importlib.metadata as metadata

          import numpy
          import torch
          import torchvision

          assert numpy.__version__ == "2.2.6"
          assert torch.__version__ == "2.11.0+cpu"
          assert torch.version.cuda is None
          assert not torch.cuda.is_available()
          assert torchvision.__version__ == "0.26.0+cpu"
          installed = {
              dist.metadata["Name"].lower().replace("_", "-")
              for dist in metadata.distributions()
              if dist.metadata["Name"]
          }
          from scripts.lock_v2_cpu import forbidden_cpu_packages

          forbidden = forbidden_cpu_packages(installed)
          assert not forbidden, f"CUDA/NCCL/Triton packages installed: {sorted(forbidden)}"
          PY
      - name: Full Alpha and CLI suite
        run: |
          uv run --no-sync pytest tests_v3
          uv run --no-sync lunavla-v3 validate-config configs/v3/fake_pusht_alpha.yaml
          uv run --no-sync lunavla-v3 validate-config configs/v3/fake_libero_alpha.yaml
          uv run --no-sync lunavla-v3 validate-config configs/v3/act_fake_libero_cpu.yaml

  diagnostics-cpu:
    name: v3-diagnostics-cpu
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install hash-locked diagnostic CPU environment
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv venv --python 3.12
          uv pip sync requirements-v3-core-cpu.lock \
            --require-hashes --strict --only-binary :all: --torch-backend cpu
          uv pip install --no-deps --no-build-isolation --editable .
          uv pip check
      - name: Reject accelerator-only packages
        run: |
          uv run --no-sync python - <<'PY'
          import importlib.metadata as metadata
          import torch

          from scripts.lock_v2_cpu import forbidden_cpu_packages

          assert torch.version.cuda is None
          assert not torch.cuda.is_available()
          installed = {
              dist.metadata["Name"].lower().replace("_", "-")
              for dist in metadata.distributions()
              if dist.metadata["Name"]
          }
          forbidden = forbidden_cpu_packages(installed)
          assert not forbidden, f"CUDA/NCCL/Triton packages installed: {sorted(forbidden)}"
          PY
      - name: Diagnostic contracts, ACT integration, evidence, and CLI
        run: |
          uv run --no-sync pytest \
            tests_v3/test_diagnostic_contracts.py \
            tests_v3/test_diagnostic_engine.py \
            tests_v3/test_diagnostic_workflow.py
          uv run --no-sync lunavla-v3 validate-config configs/v3/diagnostic_fake_libero.yaml
          uv run --no-sync lunavla-v3 diagnostic-run \
            configs/v3/diagnostic_ci_design.yaml --overwrite
          uv run --no-sync lunavla-v3 diagnostic-verify outputs/v3/diagnostic-ci
          uv run --no-sync lunavla-v3 diagnostic-report \
            outputs/v3/diagnostic-ci --out outputs/v3/diagnostic-ci-report
          uv run --no-sync lunavla-v3 diagnostic-run \
            configs/v3/diagnostic_image_ci_design.yaml --overwrite
          uv run --no-sync lunavla-v3 diagnostic-verify outputs/v3/diagnostic-image-ci
          uv run --no-sync lunavla-v3 diagnostic-report \
            outputs/v3/diagnostic-image-ci --out outputs/v3/diagnostic-image-ci-report

  profile-cpu:
    name: v3-profile-cpu
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency-light CPU profile
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv sync --frozen --extra dev
          uv pip check
      - name: Run fixed profile contract and CLI
        run: |
          uv run --no-sync pytest tests_v3/test_policy_profiling.py
          uv run --no-sync lunavla-v3 profile-run configs/v3/profile_numpy_cpu.yaml --overwrite
          uv run --no-sync lunavla-v3 profile-verify \
            outputs/v3/profiles/numpy-linear-chunk

  diffusion-cpu:
    name: v3-diffusion-cpu
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install hash-locked Diffusion CPU environment
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv venv --python 3.12
          uv pip sync requirements-v3-diffusion-cpu.lock \
            --require-hashes --strict --only-binary :all: --torch-backend cpu
          uv pip install --no-deps --no-build-isolation --editable .
          uv pip check
      - name: Verify authoritative versions and CPU-only runtime
        run: |
          uv run --no-sync python - <<'PY'
          import importlib.metadata as metadata

          import accelerate
          import diffusers
          import lerobot
          import numpy
          import torch
          import torchvision
          import transformers

          assert numpy.__version__ == "2.2.6"
          assert torch.__version__ == "2.11.0+cpu"
          assert torch.version.cuda is None
          assert not torch.cuda.is_available()
          assert torchvision.__version__ == "0.26.0+cpu"
          assert metadata.version("lerobot") == "0.6.0"
          assert diffusers.__version__ == "0.35.2"
          assert transformers.__version__ == "5.5.4"
          assert accelerate.__version__ == "1.14.0"
          installed = {
              dist.metadata["Name"].lower().replace("_", "-")
              for dist in metadata.distributions()
              if dist.metadata["Name"]
          }
          from scripts.lock_v2_cpu import forbidden_cpu_packages

          forbidden = forbidden_cpu_packages(installed)
          assert not forbidden, f"CUDA/NCCL/Triton packages installed: {sorted(forbidden)}"
          PY
      - name: Diffusion public API adapter and vertical path
        run: |
          uv run --no-sync lunavla-v3 validate-config configs/v3/diffusion_fake_libero_cpu.yaml
          uv run --no-sync pytest tests_v3/test_diffusion_policy.py

  smolvla-adapter:
    name: v3-smolvla-adapter
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install hash-locked SmolVLA conformance environment
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv venv --python 3.12
          uv pip sync requirements-v3-smolvla-cpu.lock \
            --require-hashes --strict --only-binary :all: --torch-backend cpu
          uv pip install --no-deps --no-build-isolation --editable .
          uv pip check
      - name: Verify pinned public API dependencies and CPU-only runtime
        run: |
          uv run --no-sync python - <<'PY'
          import importlib.metadata as metadata

          import accelerate
          import numpy
          import torch
          import torchvision
          import transformers

          assert numpy.__version__ == "2.2.6"
          assert torch.__version__ == "2.11.0+cpu"
          assert torch.version.cuda is None
          assert not torch.cuda.is_available()
          assert torchvision.__version__ == "0.26.0+cpu"
          assert metadata.version("lerobot") == "0.6.0"
          assert transformers.__version__ == "5.5.4"
          assert accelerate.__version__ == "1.14.0"
          installed = {
              dist.metadata["Name"].lower().replace("_", "-")
              for dist in metadata.distributions()
              if dist.metadata["Name"]
          }
          from scripts.lock_v2_cpu import forbidden_cpu_packages

          forbidden = forbidden_cpu_packages(installed)
          assert not forbidden, f"CUDA/NCCL/Triton packages installed: {sorted(forbidden)}"
          PY
      - name: SmolVLA public API conformance and license gates
        run: |
          uv run --no-sync lunavla-v3 validate-config configs/v3/smolvla_conformance_cpu.yaml
          uv run --no-sync pytest tests_v3/test_smolvla_adapter.py

  v2-compat:
    name: v3-v2-compat
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip "uv==0.11.26"
      - run: uv sync --frozen --extra dev
      - name: Preserve v1 and dependency-light v2
        run: |
          uv run --no-sync pytest tests
          uv run --no-sync pytest tests_v2 -m "not torch and not lerobot"

  secret-scan:
    name: v3-secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_repo_quality.py
