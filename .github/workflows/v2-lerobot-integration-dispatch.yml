name: V2 LeRobot Integration Dispatcher

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Reviewed branch, tag, or commit in this repository to execute
        required: true
        default: v2
        type: string
      expected_sha:
        description: Immutable 40-character lowercase commit SHA expected after checkout
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: v2-lerobot-integration-${{ inputs.expected_sha }}
  cancel-in-progress: false

jobs:
  integration:
    name: v2-real-lerobot-integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SOURCE_REF: ${{ inputs.source_ref }}
      EXPECTED_SHA: ${{ inputs.expected_sha }}
      INTEGRATION_DIR: ${{ runner.temp }}/lunavla-lerobot-integration
      CACHE_DIR: ${{ runner.temp }}/lunavla-lerobot-cache
      MANIFEST_PATH: ${{ runner.temp }}/lunavla-lerobot-integration/integration_manifest.json
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Validate immutable request
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_REF" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]{0,254}$ ]]
          [[ "$SOURCE_REF" != refs/pull && "$SOURCE_REF" != refs/pull/* ]]
          [[ "$SOURCE_REF" != pull && "$SOURCE_REF" != pull/* ]]
          [[ "$SOURCE_REF" != *..* && "$SOURCE_REF" != *//* && "$SOURCE_REF" != */ ]]
          if [[ ! "$SOURCE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            git check-ref-format --branch "$SOURCE_REF" >/dev/null
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify checkout identity and source contracts
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse --verify HEAD^{commit})" = "$EXPECTED_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          test -f requirements-v2-integration-cpu.lock
          test -f scripts/lock_v2_cpu.py
          test -f scripts/run_v2_lerobot_integration.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the hash-locked Linux CPU integration profile
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip "uv==0.11.26"
          uv venv --python 3.12
          uv pip sync requirements-v2-integration-cpu.lock \
            --require-hashes --strict --only-binary :all: --torch-backend cpu
          uv pip install --no-deps --no-build-isolation --editable .
          uv pip check
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Verify authoritative CPU dependency contract
        shell: bash
        run: |
          set -euo pipefail
          uv run --no-sync python - <<'PY'
          import importlib
          import importlib.metadata as metadata

          import numpy
          import torch
          import torchvision

          expected = {
              "av": "15.1.0",
              "gym-pusht": "0.1.6",
              "gymnasium": "1.3.0",
              "huggingface-hub": "1.23.0",
              "lerobot": "0.6.0",
              "numpy": "2.2.6",
              "pymunk": "7.3.0",
              "torch": "2.11.0+cpu",
              "torchvision": "0.26.0+cpu",
          }
          actual = {name: metadata.version(name) for name in expected}
          assert actual == expected, (actual, expected)
          assert numpy.__version__ == "2.2.6"
          assert torch.__version__ == "2.11.0+cpu"
          assert torch.version.cuda is None
          assert not torch.cuda.is_available()
          assert torchvision.__version__ == "0.26.0+cpu"
          for module in ("av", "gym_pusht", "gymnasium", "lerobot", "pymunk"):
              importlib.import_module(module)

          installed = {
              dist.metadata["Name"].lower().replace("_", "-")
              for dist in metadata.distributions()
              if dist.metadata["Name"]
          }
          from scripts.lock_v2_cpu import forbidden_cpu_packages

          forbidden = forbidden_cpu_packages(installed)
          assert not forbidden, f"forbidden CPU packages installed: {sorted(forbidden)}"
          PY

      - name: Run and verify pinned real integration
        shell: bash
        run: |
          set -euo pipefail
          test ! -e "$INTEGRATION_DIR"
          test ! -e "$CACHE_DIR"
          install -d -m 0700 "$INTEGRATION_DIR" "$CACHE_DIR"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          uv run --no-sync python scripts/run_v2_lerobot_integration.py run \
            --expected-git-sha "$EXPECTED_SHA" \
            --cache-dir "$CACHE_DIR" \
            --output "$MANIFEST_PATH"
          uv run --no-sync python scripts/run_v2_lerobot_integration.py verify \
            --expected-git-sha "$EXPECTED_SHA" \
            "$MANIFEST_PATH"

      - name: Enforce the manifest-only artifact boundary
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob
          artifacts=("$INTEGRATION_DIR"/*)
          test "${#artifacts[@]}" -eq 1
          test "${artifacts[0]}" = "$MANIFEST_PATH"
          test -f "$MANIFEST_PATH"

      - name: Attest the exact integration manifest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ runner.temp }}/lunavla-lerobot-integration/integration_manifest.json

      - name: Upload integration manifest only
        uses: actions/upload-artifact@v4
        with:
          name: v2-lerobot-integration-${{ inputs.expected_sha }}
          path: ${{ runner.temp }}/lunavla-lerobot-integration/integration_manifest.json
          if-no-files-found: error
          retention-days: 30
