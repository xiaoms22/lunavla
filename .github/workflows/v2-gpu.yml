name: V2 GPU Full Training

on:
  workflow_dispatch:
    inputs:
      config:
        description: Versioned v2 configuration to train
        required: true
        default: configs/v2/transformer_chunk_cuda.yaml
        type: string

permissions:
  contents: read

concurrency:
  group: v2-gpu-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gpu-training:
    name: v2-gpu-training
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the locked v2 profile
        run: |
          python -m pip install --upgrade pip "uv==0.11.26"
          uv lock --check
          uv sync --frozen --extra dev --extra v2
          uv pip check
      - name: Validate CUDA and the selected config
        env:
          CONFIG: ${{ inputs.config }}
        run: |
          uv run --no-sync python -c "import torch; assert torch.cuda.is_available()"
          uv run --no-sync lunavla-v2 validate-config "$CONFIG"
          uv run --no-sync pytest tests_v2 -m torch
      - name: Run full training
        env:
          CONFIG: ${{ inputs.config }}
        run: >-
          uv run --no-sync lunavla-v2 train "$CONFIG"
          --require-device cuda --require-clean
      - name: Verify generated manifests and artifact hashes
        shell: bash
        run: |
          mapfile -t manifests < <(find outputs -name manifest.json -type f -print)
          test "${#manifests[@]}" -eq 1
          uv run --no-sync lunavla-v2 verify-run "$(dirname "${manifests[0]}")"
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: v2-gpu-${{ github.sha }}
          path: outputs/
          if-no-files-found: error
          retention-days: 30
