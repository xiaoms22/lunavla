name: Fast CI

on:
  push:
    branches: [main, v1.x]
  pull_request:
    branches: [main, v1.x]

permissions:
  contents: read

concurrency:
  group: fast-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Ruff
        run: |
          ruff check .
          ruff check scripts/run_v2_release_profile.py
      - name: Mypy
        run: mypy dataset model trainer lunavla scripts/run_v2_release_profile.py eval_vla.py
      - name: Compile Python sources
        run: python -m compileall -q dataset model scripts trainer eval_vla.py
      - name: Validate configuration files
        run: python scripts/validate_configs.py
      - name: Check repository claims and paths
        run: python scripts/check_repo_quality.py
      - name: Check local documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline --no-progress
            --exclude-path docs/archive
            README.md CONTRIBUTING.md SECURITY.md MODEL_CARD.md DATA_CARD.md docs
          fail: true

  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run test suite with coverage gate
        run: python -m pytest tests --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-3.12
          path: coverage.xml

  cpu-smoke:
    name: cpu-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run the beginner CPU quickstart
        run: timeout 120 python scripts/run_quickstart.py

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan the complete Git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
