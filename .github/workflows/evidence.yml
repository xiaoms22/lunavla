name: Full Evidence

on:
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evidence:
    name: controlled-evidence
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install evidence dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt "cyclonedx-bom>=4,<5"
      - name: Verify the fast test gate
        run: |
          ruff check .
          mypy dataset model trainer eval_vla.py
          python -m pytest --cov --cov-report=term-missing
      - name: Run the declared 5x20 controlled matrix
        run: python scripts/run_controlled_experiments.py --suite all --overwrite
      - name: Validate and snapshot every controlled run
        shell: bash
        run: |
          mapfile -t manifests < <(find outputs/controlled_v11 -name manifest.json -type f -print | sort)
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No controlled manifests were produced" >&2
            exit 1
          fi
          run_dirs=()
          for manifest in "${manifests[@]}"; do
            run_dirs+=("$(dirname "$manifest")")
          done
          python scripts/build_v11_evidence_snapshot.py \
            --runs "${run_dirs[@]}" \
            --analysis-root outputs/controlled_v11 \
            --out-dir release-assets/results/v1.1 \
            --overwrite
          cp README.md release-assets/README.md
          python scripts/render_readme_results.py \
            --index release-assets/results/v1.1/index.json \
            --readme release-assets/README.md
      - name: Generate SBOM and checksums
        run: |
          mkdir -p release-assets
          python -m pip freeze --all > release-assets/environment-requirements.txt
          cyclonedx-py requirements release-assets/environment-requirements.txt \
            --output-reproducible --outfile release-assets/sbom.json
          tar -czf release-assets/lunavla-v1.1-evidence.tar.gz \
            release-assets/README.md release-assets/results outputs/controlled_v11
          (
            cd release-assets
            sha256sum \
              lunavla-v1.1-evidence.tar.gz \
              README.md \
              environment-requirements.txt \
              sbom.json \
              > SHA256SUMS
          )
      - name: Upload complete evidence
        uses: actions/upload-artifact@v7
        with:
          name: lunavla-full-evidence-${{ github.sha }}
          path: release-assets/
          if-no-files-found: error
          retention-days: 30
